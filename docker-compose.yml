# TeoNova-Vet — stack Docker (desarrollo y despliegue)
#
# Uso rápido:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d --build
#   docker compose --env-file .env.docker --profile setup run --rm setup-admin
#
# App: http://localhost  (Nginx → frontend + /api → backend)

name: veterinaria-pos

services:
  db:
    image: mysql:8.0
    container_name: vetpos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-veterinaria_pos}
      MYSQL_USER: ${DB_USERNAME:-vetapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vetapp_secret}
      TZ: America/Bogota
    ports:
      - "${DB_PORT_PUBLISH:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema_v2.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/docker-init/02-patches.sql:/docker-entrypoint-initdb.d/02-patches.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=-05:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vetpos

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vetpos-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    networks:
      - vetpos

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vetpos-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - vetpos

  # Ejecutar una vez después del primer `up` para contraseñas de demo
  setup-admin:
    image: node:20-alpine
    container_name: vetpos-setup-admin
    working_dir: /app
    volumes:
      - ./setup-admin.js:/app/setup-admin.js:ro
      - ./package.json:/app/package.json:ro
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-vetapp}
      DB_PASSWORD: ${DB_PASSWORD:-vetapp_secret}
      DB_NAME: ${DB_NAME:-veterinaria_pos}
    command: >
      sh -c "npm install --omit=dev bcrypt mysql2 dotenv 2>/dev/null;
             node setup-admin.js"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vetpos
    profiles:
      - setup

volumes:
  mysql_data:

networks:
  vetpos:
    driver: bridge
